- defaults:
    link:
      relink: true

- create:
    - ~/.config/nvim

- link:
    ~/.config/nvim/init.lua: init.lua
    ~/.config/nvim/lua: lua
    ~/.config/nvim/tree-sitter-parsers: tree-sitter-parsers

- shell:
  - git clone --depth 1 https://github.com/wbthomason/packer.nvim ~/.local/share/nvim/site/pack/packer/start/packer.nvim
